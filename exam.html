<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam - Tech Skill Exams</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <h1 id="examTitle">Java Basic Exam</h1>
    </div>
  </nav>

  <div class="container">
    <div class="exam-card">
      <div class="exam-header">
        <div class="question-number" id="questionNumber">Question 1 / 10</div>
        <div class="progress-percentage" id="progressPercentage">10%</div>
      </div>

      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <div class="question-content">
        <h2 class="question-text" id="questionText">What is JVM in Java?</h2>

        <div class="options" id="optionsContainer">
          <!-- Options will be loaded here -->
        </div>
      </div>

      <div class="exam-navigation">
        <button class="btn btn-secondary" id="prevBtn" onclick="previousQuestion()">Previous</button>
        <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">Next</button>
      </div>
    </div>
  </div>

  <script src="exam.js"></script>
</body>
</html>
