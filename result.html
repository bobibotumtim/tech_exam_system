<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam Result - Tech Skill Exams</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <h1 id="examTitle">Java Basic Exam</h1>
    </div>
  </nav>

  <div class="container">
    <div class="result-card">
      <div class="result-icon">🎉</div>
      <h1>Exam Completed!</h1>
      
      <div class="score-display">
        <div class="score-label">Your Score:</div>
        <div class="score-value" id="scoreValue">7 / 10</div>
      </div>

      <div class="percentage-display">
        <div class="percentage-label">Percentage:</div>
        <div class="percentage-value" id="percentageValue">70%</div>
      </div>

      <div class="result-actions">
        <button class="btn btn-primary" onclick="reviewExam()">Review Exam</button>
        <button class="btn btn-secondary" onclick="backToHome()">Back to Home</button>
      </div>
    </div>
  </div>

  <script src="result.js"></script>
</body>
</html>
